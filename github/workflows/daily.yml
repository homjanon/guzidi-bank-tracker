name: 招招五维·五大行每日追踪

on:
  schedule:
    # 北京时间 16:30 盘后（UTC 08:30），周一至周五
    - cron: "30 8 * * 1-5"
  workflow_dispatch:        # 允许手动触发（测试用）

permissions:
  contents: write           # 自动 commit history.jsonl + docs

concurrency:
  group: cmb-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily tracker
        env:
          TZ: Asia/Shanghai
          BIYING_API_KEY: ${{ secrets.BIYING_API_KEY }}
        run: |
          cd scripts
          python run_daily.py

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentals.json history.jsonl docs/ output/
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: 每日追踪更新 $(date +%Y-%m-%d)"
            git push
          fi
